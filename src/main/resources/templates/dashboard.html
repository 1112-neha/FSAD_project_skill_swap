<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: header}"></div>
</head>

<body>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container mt-4">
        <h2 class="mb-4">My Dashboard</h2>

        <div class="row">
            <!-- Add Skill Form -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white text-center">
                        <h5 class="mb-0">Add a New Skill</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/dashboard/add-skill}" th:object="${newSkill}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Skill Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" required
                                    placeholder="e.g. Java, Guitar, French">
                            </div>
                            <div class="mb-4">
                                <label for="type" class="form-label">Skill Type</label>
                                <select class="form-select" id="type" th:field="*{type}" required>
                                    <option value="" disabled selected>Select type...</option>
                                    <option value="TEACH">I can teach this</option>
                                    <option value="LEARN">I want to learn this</option>
                                </select>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">Add Skill</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- My Skills List -->
            <div class="col-md-8 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">My Skills</h5>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs" id="myTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="teach-tab" data-bs-toggle="tab"
                                    data-bs-target="#teach-tab-pane" type="button" role="tab"
                                    aria-controls="teach-tab-pane" aria-selected="true">Skills I Teach</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="learn-tab" data-bs-toggle="tab"
                                    data-bs-target="#learn-tab-pane" type="button" role="tab"
                                    aria-controls="learn-tab-pane" aria-selected="false">Skills I Learn</button>
                            </li>
                        </ul>
                        <div class="tab-content pt-3" id="myTabContent">
                            <div class="tab-pane fade show active" id="teach-tab-pane" role="tabpanel"
                                aria-labelledby="teach-tab" tabindex="0">
                                <ul class="list-group list-group-flush">
                                    <th:block th:each="skill : ${skills}">
                                        <li class="list-group-item d-flex justify-content-between align-items-center"
                                            th:if="${skill.type.name() == 'TEACH'}">
                                            <span class="fs-5" th:text="${skill.name}">Skill Name</span>
                                            <span class="badge bg-info rounded-pill">Teach</span>
                                        </li>
                                    </th:block>
                                    <li class="list-group-item text-muted" th:if="${skills.isEmpty()}">No skills added
                                        yet.</li>
                                </ul>
                            </div>
                            <div class="tab-pane fade" id="learn-tab-pane" role="tabpanel" aria-labelledby="learn-tab"
                                tabindex="0">
                                <ul class="list-group list-group-flush">
                                    <th:block th:each="skill : ${skills}">
                                        <li class="list-group-item d-flex justify-content-between align-items-center"
                                            th:if="${skill.type.name() == 'LEARN'}">
                                            <span class="fs-5" th:text="${skill.name}">Skill Name</span>
                                            <span class="badge bg-warning rounded-pill text-dark">Learn</span>
                                        </li>
                                    </th:block>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>

</html>
